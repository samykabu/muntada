apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis
    release: {{ .Release.Name }}
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
    {{- if .Values.sentinel.enabled }}
    - port: 26379
      targetPort: 26379
      name: sentinel
    {{- end }}
