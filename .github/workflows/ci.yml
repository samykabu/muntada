name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  backend-lint:
    name: Backend Lint (StyleCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore backend/Muntada.slnx
      - run: dotnet build backend/Muntada.slnx --no-restore -warnaserror

  backend-test:
    name: Backend Tests (xUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore backend/Muntada.slnx
      - run: dotnet test backend/tests/Muntada.SharedKernel.Tests/ --no-restore --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 30

  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/src/Muntada.Api/Dockerfile -t muntada-api:${{ github.sha }} .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t muntada-frontend:${{ github.sha }} frontend/

  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend
        run: |
          docker build -f backend/src/Muntada.Api/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/muntada-api:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/muntada-api:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/muntada-api:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/muntada-api:latest
      - name: Build and push frontend
        run: |
          docker build -f frontend/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/muntada-frontend:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/muntada-frontend:latest frontend/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/muntada-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/muntada-frontend:latest
